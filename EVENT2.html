<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경품 이벤트 룰렛</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #2b3d2b; 
            background-image: url('bg.png'); 
            background-size: cover;      
            background-position: center; 
            background-repeat: no-repeat;
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        h2 { 
            color: #ffffff; 
            margin-bottom: 30px; 
            font-size: 28px; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.7); 
            font-weight: 800;
        }

        .roulette-container { 
            position: relative; 
            width: 380px; 
            height: 380px; 
            max-width: 90vw; 
            max-height: 90vw;
            margin: 0 auto; 
        }

        canvas { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
            background: white; 
        }

        .arrow { 
            position: absolute; 
            top: -20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 0; height: 0; 
            border-left: 20px solid transparent; 
            border-right: 20px solid transparent; 
            border-top: 45px solid #ff0000; 
            z-index: 5; 
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
        }

        button#spinBtn {
            margin-top: 40px; 
            padding: 15px 60px; 
            font-size: 24px; 
            font-weight: bold;
            background: #d60036; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            transition: transform 0.1s;
        }
        button#spinBtn:active { transform: scale(0.95); }
        button#spinBtn:disabled { background: #ccc; cursor: not-allowed; }

        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: popUp 0.4s ease-out; 
            border: 5px solid #d60036;
        }

        @keyframes popUp {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 2rem;
            color: #d60036;
            margin: 0 0 20px 0;
            font-weight: 900;
        }

        .modal-text {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.5;
            word-break: keep-all;
        }

        .close-btn {
            padding: 12px 40px;
            background: #2b3d2b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .close-btn:hover { background: #1a251a; }

        @media print { 
            * { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                color-adjust: exact !important; 
            } 
        }
    </style>
</head>
<body>

    <h2>🎁 카카오플러스 친구 추가하고 100% 선물 증정 룰렛 도전 🎁</h2>
    
    <div class="roulette-container">
        <div class="arrow"></div>
        <canvas id="wheel" width="800" height="800"></canvas>
    </div>
    
    <button id="spinBtn">START!</button>

    <audio id="bgmSpin" src="spin.mp3" preload="auto"></audio>
    <audio id="bgmWin" src="win.mp3" preload="auto"></audio>

    <div id="resultModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">🎉 축하합니다! 🎉</h3>
            <p id="modalMessage" class="modal-text">당첨 결과가 여기에 나옵니다.</p>
            <button class="close-btn" onclick="closeModal()">확인</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            const canvas = document.getElementById('wheel');
            const ctx = canvas.getContext('2d');
            const btn = document.getElementById('spinBtn');
            const modal = document.getElementById('resultModal');
            const modalMsg = document.getElementById('modalMessage');
            
            const spinSound = document.getElementById('bgmSpin');
            const winSound = document.getElementById('bgmWin');

            const products = ["1등", "2등", "3등", "4등", "5등"];
            const colors = ["#FF5733", "#FFBD33", "#FFFF33", "#33FF57", "#3385FF"];
            
            const messages = {
                "1등": "대박!!<br>🍗 <b>에어프라이어</b> 🍗<br>당첨되셨습니다!",
                "2등": "와우!!<br>🍲 <b>스탠냄비SET</b> 🍲<br>당첨되셨습니다!",
                "3등": "축하합니다!<br>🥗 <b>글라스볼SET</b> 🥗<br>당첨되셨습니다!",
                "4등": "축하합니다!<br>🧴 <b>핸드크림</b> 🧴<br>당첨되셨습니다!",
                "5등": "축하합니다!<br>🧻 <b>키친타올</b> 🧻<br>당첨되셨습니다!"
            };

            const numSegments = products.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;

            function drawWheel() {
                const centerX = 400;
                const centerY = 400;
                const radius = 400;

                ctx.translate(centerX, centerY);
                ctx.rotate(-Math.PI / 2); 
                ctx.translate(-centerX, -centerY);

                for (let i = 0; i < numSegments; i++) {
                    const angle = i * anglePerSegment;
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, radius, angle, angle + anglePerSegment);
                    ctx.fillStyle = colors[i];
                    ctx.fill();
                    ctx.strokeStyle = "#ffffff";
                    ctx.lineWidth = 4; 
                    ctx.stroke();

                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(angle + anglePerSegment / 2);
                    ctx.textAlign = "right";
                    ctx.fillStyle = "#333";
                    ctx.font = "bold 50px Arial"; 
                    ctx.fillText(products[i], 350, 15); 
                    ctx.restore();
                }
                ctx.setTransform(1, 0, 0, 1, 0, 0);
            }

            window.closeModal = function() {
                modal.style.display = 'none';
                btn.disabled = false;
            };

            btn.onclick = function() {
                btn.disabled = true;

                try {
                    spinSound.currentTime = 0;
                    spinSound.play();
                } catch(e) { console.error(e); }

                const rand = Math.random() * 100; 
                let targetIndex = 4; // 기본 5등

                // [요청된 확률 반영 로직]
                if (rand < 0.1) { 
                    targetIndex = 0; // 1등: 0.1%
                } 
                else if (rand < 0.4) { 
                    targetIndex = 1; // 2등: 0.3% (누적 0.4)
                } 
                else if (rand < 1.4) { 
                    targetIndex = 2; // 3등: 1.0% (누적 1.4)
                } 
                else if (rand < 3.4) { 
                    targetIndex = 3; // 4등: 2.0% (누적 3.4)
                } 
                else {
                    targetIndex = 4; // 5등: 96.6% (나머지)
                }
                
                const segmentAngle = 360 / numSegments;
                const offset = (segmentAngle / 2) + (Math.random() * 50 - 25); 
                const targetAngle = (targetIndex * segmentAngle) + offset;

                const finalRotate = 1800 + (360 - targetAngle);

                canvas.style.transition = "transform 4s cubic-bezier(0.25, 0.1, 0.25, 1)";
                canvas.style.transform = `rotate(${finalRotate}deg)`;

                setTimeout(() => {
                    spinSound.pause(); 
                    
                    try {
                        winSound.currentTime = 0;
                        winSound.play();
                    } catch(e) { console.error(e); }

                    const result = products[targetIndex]; 
                    
                    setTimeout(() => {
                        modalMsg.innerHTML = messages[result]; 
                        modal.style.display = 'flex'; 
                        
                        canvas.style.transition = "none";
                        const actualDegree = finalRotate % 360;
                        canvas.style.transform = `rotate(${actualDegree}deg)`;
                    }, 300); 

                }, 4000);
            };

            drawWheel();
        };
    </script>
</body>
</html>
